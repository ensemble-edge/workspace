name = "my-workspace"
main = "worker.ts"
compatibility_date = "2024-01-01"

[vars]
WORKSPACE_NAME = "My Workspace"

[[d1_databases]]
binding = "DB"
database_name = "my-workspace-db"
database_id = ""

[[kv_namespaces]]
binding = "CACHE"
id = ""

[[r2_buckets]]
binding = "FILES"
bucket_name = "my-workspace-files"
